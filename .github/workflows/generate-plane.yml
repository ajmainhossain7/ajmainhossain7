name: Generate Contribution Plane ✈️

on:
  schedule:
    - cron: "0 */12 * * *"   # Runs every 12 hours — keeps animation always fresh
  workflow_dispatch:           # Allows manual trigger from Actions tab
  push:
    branches: [main]           # Also runs on every push to main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Contribution Animation
        uses: Platane/snk@v3
        with:
          github_user_name: ajmainhossain7
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
